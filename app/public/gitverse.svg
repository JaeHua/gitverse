  <!-- branch L1 -->
  <line x1="24" y1="28" x2="16" y2="22" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="32" y2="20" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- branch L2 -->
  <line x1="16" y1="22" x2="10" y2="16" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="14" y2="14" stroke="url(#g)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="22" x2="18" y2="12" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="28" y2="14" stroke="url(#g)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="20" x2="38" y2="14" stroke="url(#g)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- nodes L3 -->
  <circle cx="10" cy="16" r="2.5" fill="#2563eb"/>
