  <circle cx="18" cy="12" r="3" fill="#2563eb"/>
  <circle cx="28" cy="14" r="2" fill="#0d9488" opacity="0.8"/>
  <circle cx="38" cy="14" r="2.5" fill="#2563eb"/>
