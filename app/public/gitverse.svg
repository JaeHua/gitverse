  </defs>
  <!-- git icon base -->
  <circle cx="24" cy="38" r="3" fill="url(#g)"/>
  <circle cx="18" cy="38" r="2" fill="url(#g)" opacity="0.6"/>
  <line x1="20" y1="38" x2="22" y2="38" stroke="url(#g)" stroke-width="1.5"/>
