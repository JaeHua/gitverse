  <circle cx="24" cy="22" r="3.5" fill="url(#g)"/>
  <!-- connections -->
  <line x1="10" y1="16" x2="14" y2="14" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>
  <line x1="14" y1="14" x2="18" y2="12" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="12" x2="28" y2="14" stroke="#0d9488" stroke-width="0.8" opacity="0.4"/>
